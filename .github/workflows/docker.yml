name: Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # metadata-action lowercases the image name, which ghcr.io requires.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/r-c-typing
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # PRIVATE_REPO_PAT is injected as a BuildKit secret — it is never
          # written to any image layer.
          secrets: |
            pat=${{ secrets.PRIVATE_REPO_PAT }}

      # Notify the r-typing repo so it reruns the analysis pipeline.
      # Requires a PAT (PIPELINE_DISPATCH_TOKEN) with `workflow` scope on
      # the r-typing repository, stored as a secret here in r-c-typing.
      - name: Trigger r-typing pipeline
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PIPELINE_DISPATCH_TOKEN }}
          repository: PRL-PRG/r-typing
          event-type: r-c-typing-updated
